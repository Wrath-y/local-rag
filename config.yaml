model:
  name: "BAAI/bge-small-zh-v1.5"

embedding:
  doc_prefix: "段落："
  query_prefix: "查询："

chunk:
  min_tokens: 200
  max_tokens: 400
  structure_aware: true   # 启用结构感知分块（Markdown 表格/代码块/列表保持原子完整）
  hierarchical:
    enabled: false           # 默认关闭，开启后启用 Parent-Child 层次化分块
    parent_max_tokens: 800   # parent chunk 的最大 token 数（child 用于检索，命中后返回 parent 给 LLM）

retrieve:
  top_k: 3
  verbose: true
  dynamic_top_k: false     # 根据剩余上下文窗口自动调整 top_k
  context_window: 180000   # 模型上下文窗口 token 数（保守值，预留 system prompt 开销）
  response_reserve: 8000   # 为模型回复预留的 token 数

rerank:
  enabled: false
  model: "BAAI/bge-reranker-base"

storage:
  index_path: "index.bin"
  texts_path: "chunks.pkl"
  wal:
    enabled: true       # WAL 开关；false 时回退到无 replay 行为
    max_size_mb: 10     # 超过此大小触发 checkpoint 并截断 WAL
  backup:
    enabled: true
    schedule: "0 3 * * *"    # cron：每天本地时间 03:00 自动备份
    retention:
      days: 7                # 过去 N 天每天保留 1 份
      weeks: 4               # 过去 M 周每周保留 1 份

log:
  lang: "en"   # 日志语言：zh（中文）或 en（English）

server:
  port: 8765

llm:
  provider: "anthropic"            # openai | anthropic（或自定义注册的供应商名）
  model: "claude-sonnet-4-6"
  api_key_env: "ANTHROPIC_API_KEY" # 从环境变量读取，不写死 key
  timeout: 30
  max_retries: 2

query_rewrite:
  enabled: false
  strategy: "expansion"   # expansion | hyde | multi_query
  provider: ""            # 留空则继承 llm.provider；可单独指定如 "openai"
