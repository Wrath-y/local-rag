model:
  name: "BAAI/bge-small-zh-v1.5"

embedding:
  doc_prefix: "段落："
  query_prefix: "查询："

chunk:
  # Top-level chunking strategy selector:
  #   fixed     — sentence-level chunks of fixed size (default; backward compatible)
  #   structure — structure-aware chunks that preserve Markdown tables, code blocks, and lists intact
  #   semantic  — splits at semantic boundaries based on embedding cosine similarity
  #   agentic   — uses an LLM to analyze document structure and choose chunk boundaries (higher cost; suited to high-value documents)
  strategy: "fixed"
  min_tokens: 200
  max_tokens: 400
  structure_aware: true   # When strategy=fixed, still controls whether structure awareness is enabled for Markdown (backward compatible)
  semantic:
    enabled: false           # Enables semantic chunking as a hint; strategy=semantic ultimately takes precedence
    threshold_percentile: 90 # Split only where similarity is below the (100-N)th percentile; higher values produce coarser chunks (90 ≈ split at the 10th percentile)
    min_chunk_size: 2        # Minimum number of sentences per chunk
    max_chunk_size: 20       # Maximum number of sentences per chunk
  agentic:
    enabled: false              # Enables agentic chunking as a hint; strategy=agentic ultimately takes precedence
    generate_summary: true      # Have the LLM generate and prepend a one-sentence summary for each chunk
    max_llm_input_tokens: 4000  # Maximum tokens sent to the LLM per request; oversized documents are processed in line-based segments
  hierarchical:
    enabled: false           # Disabled by default; enables parent-child hierarchical chunking when true
    parent_max_tokens: 800   # Maximum tokens per parent chunk (children are retrieved; the matched parent is returned to the LLM)
  context_prefix:
    enabled: false           # Disabled by default; prepends the heading hierarchy to chunk text as breadcrumbs when enabled
    format: "breadcrumb"     # Prefix format; currently only breadcrumb is supported (for example, [A > B > C])
    max_depth: 3             # Maximum number of heading levels to propagate (uses the last N headings in the stack)

retrieve:
  top_k: 3
  verbose: true
  dynamic_top_k: false     # Automatically adjust top_k according to the remaining context window
  context_window: 180000   # Model context-window size in tokens (conservative value that reserves room for the system prompt)
  response_reserve: 8000   # Tokens reserved for the model response

rerank:
  enabled: false
  model: "BAAI/bge-reranker-base"

storage:
  index_path: "index.bin"
  texts_path: "chunks.pkl"
  wal:
    enabled: true       # Enables WAL; false falls back to behavior without replay
    max_size_mb: 10     # Trigger a checkpoint and truncate the WAL once it exceeds this size
  backup:
    enabled: true
    schedule: "0 3 * * *"    # Cron: automatically back up daily at 03:00 local time
    retention:
      days: 7                # Retain one backup per day for the past N days
      weeks: 4               # Retain one backup per week for the past M weeks

# Opt-in durable incremental source synchronization. Existing /ingest callers
# retain their behaviour when this is disabled.
sync:
  enabled: false
  workers: 1
  max_snapshot_bytes: 16777216
  max_attempts: 3
  task_retention_hours: 168
  report_retention_hours: 720
  staging_retention_hours: 24

# Production document connectors are opt-in through /ingest or rag_ingest.
# Requests may reduce these limits but cannot raise them.
connectors:
  allowed_local_paths: ["."]
  allowed_url_schemes: ["http", "https"]
  max_source_bytes: 20971520
  max_documents: 500
  max_extracted_bytes: 52428800
  max_duration_seconds: 60
  max_git_files: 2000
  max_git_file_bytes: 2097152
  max_git_total_bytes: 52428800
  exclusions: [".env", "node_modules/", "vendor/"]

# Local retrieval feedback ledger. No plaintext query is retained unless the
# explicitly opt-in excerpt switch is enabled.
feedback:
  enabled: true
  retention_days: 30
  store_query_excerpt: false
  query_excerpt_max_chars: 256
  note_max_chars: 1000
  review_note_max_chars: 1000
  export_max_records: 10000
  candidate_conversion_max: 1000

log:
  lang: "en"   # Log language: zh (Chinese) or en (English)

server:
  port: 8765

llm:
  provider: "openrouter"            # openai | anthropic (or the name of a custom registered provider)
  model: "deepseek-v4-flash"
  api_key_env: "OPENROUTER_API_KEY" # Read the API key from an environment variable; never hard-code it
  timeout: 30
  max_retries: 2

query_rewrite:
  enabled: false
  strategy: "expansion"   # expansion | hyde | multi_query
  provider: ""            # Empty inherits llm.provider; can be set independently, for example, "openai"

# Agent v1 tool loop: only read-only rag_retrieve is registered.
agent:
  max_rounds: 5
  max_tool_calls: 4
  deadline_seconds: 20
  max_context_bytes: 24000
  max_result_bytes: 12000
  max_top_k: 3
